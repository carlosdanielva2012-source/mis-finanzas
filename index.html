<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Daniel Pro - v2.7</title>
    <style>
  :root {
    --primary-p: #2563eb; 
    --primary-c: #FCDB3F; 
    --bg: #F0F3F7;
    --text-dark: #1e293b; 
    --danger: #ef4444; 
    --success: #10b981;
}

body { 
    font-family: 'Segoe UI', sans-serif; 
    background: var(--bg); 
    margin: 0; 
    padding-bottom: 110px; 
    display: flex; 
    justify-content: center; 
}

/* Ajuste principal para Tablet */
.app-container { 
    width: 100%; 
    max-width: 800px; /* Incrementado para tablet */
    padding: 30px 20px; 
    box-sizing: border-box; 
}

.tab-content { display: none; width: 100%; }
.tab-content.active { display: block; }

/* Tarjeta principal más prominente */
.main-card { 
    background: var(--primary-p); 
    color: white; 
    padding: 40px 25px; 
    border-radius: 24px; 
    text-align: center; 
    margin-bottom: 20px; 
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2); 
}

.main-card.corriente-mode { 
    background: var(--primary-c); 
    color: var(--text-dark); 
    box-shadow: 0 10px 25px rgba(252, 219, 63, 0.2);
}

.main-card h1 { 
    font-size: 4rem; /* Más grande en tablet */
    margin: 15px 0; 
    font-weight: bold; 
}

.pill { 
    background: rgba(0,0,0,0.1); 
    padding: 8px 16px; 
    border-radius: 14px; 
    font-size: 1rem; 
    margin: 6px 0; 
    display: inline-block; 
}

.info-panel { 
    background: #fef9c3; 
    border: 1px solid #fde047; 
    padding: 20px; 
    border-radius: 18px; 
    margin-bottom: 25px; 
    display: grid; 
    grid-template-columns: 1fr 1fr 1fr; 
    gap: 15px; 
    text-align: center; 
    font-size: 0.9rem; 
    color: #854d0e; 
}

.acc-selector { 
    display: flex; 
    background: #E2E8F0; 
    padding: 6px; 
    border-radius: 16px; 
    margin-bottom: 25px; 
}

.acc-btn { 
    flex: 1; 
    padding: 16px; 
    border: none; 
    background: transparent; 
    color: #64748b; 
    font-weight: 600; 
    font-size: 1.1rem;
    cursor: pointer; 
    border-radius: 12px; 
    transition: 0.3s;
}

.acc-btn.active { 
    background: white; 
    color: var(--text-dark); 
    box-shadow: 0 4px 8px rgba(0,0,0,0.08); 
}

/* Formulario más espacioso */
.form-card { 
    background: white; 
    padding: 30px; 
    border-radius: 24px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
}

.form-group { margin-bottom: 20px; }
.form-label { 
    display: block; 
    margin-bottom: 8px; 
    font-size: 1rem; 
    font-weight: 600; 
    color: #64748b; 
}

.input-ctrl { 
    width: 100%; 
    padding: 16px; 
    border: 2px solid #e2e8f0; 
    border-radius: 14px; 
    font-size: 1.1rem; 
    box-sizing: border-box; 
    outline: none; 
}

.input-ctrl:focus { border-color: var(--primary-p); }

.btn-save { 
    width: 100%; 
    padding: 20px; 
    border-radius: 14px; 
    border: none; 
    background: var(--primary-p); 
    color: white; 
    font-size: 1.2rem; 
    font-weight: bold; 
    cursor: pointer; 
    transition: transform 0.1s;
}

.btn-save:active { transform: scale(0.98); }

/* Historial */
.reg-item { 
    background: white; 
    padding: 20px; 
    margin-bottom: 12px; 
    border-radius: 16px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-left: 8px solid; 
}

.reg-info b { font-size: 1.1rem; }
.reg-info span { font-size: 1rem; color: #475569; }

/* Barra de navegación */
.tab-bar { 
    position: fixed; 
    bottom: 0; 
    width: 100%; 
    max-width: 800px; /* Alineado con el contenedor */
    background: white; 
    display: flex; 
    justify-content: space-around; 
    padding: 15px 0; 
    border-top: 1px solid #e2e8f0; 
    border-radius: 25px 25px 0 0; 
    box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
}

.tab-item { 
    border: none; 
    background: none; 
    color: #64748b; 
    font-size: 1rem; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    cursor: pointer; 
}

.tab-item span { margin-top: 4px; }
.tab-item.active { color: var(--primary-p); font-weight: bold; }

/* Modales */
.modal-body { 
    background: white; 
    width: 85%; 
    max-width: 500px; 
    border-radius: 24px; 
    padding: 30px; 
}

.hidden { display: none; }

    </style>
</head>
<body>

<div class="app-container">
    <div id="tab-inicio" class="tab-content active">
        <div class="main-card" id="mainCard">
            <span id="labelAcc">Cuenta Personal</span>
            <h1 id="balDisplay">$0.00</h1>
            <div id="boxDaily" class="pill">Disponible/día: <b id="valDaily">$0.00</b></div><br>
            <div class="pill">Proyectado: <b id="valProj">$0.00</b></div>
        </div>
        <div id="panelC" class="info-panel hidden">
            <div>🗓️ Corte<br><b>9/Mar</b></div><div>💵 Pago<br><b>6/Abr</b></div><div>💳 Límite<br><b>$400.00</b></div>
        </div>
        <div class="acc-selector">
            <button onclick="changeAcc('personal')" id="btnP" class="acc-btn active">Personal</button>
            <button onclick="changeAcc('corriente')" id="btnC" class="acc-btn">Corriente</button>
        </div>
        <div class="form-card">
            <div class="form-group"><label class="form-label">Fecha</label><input type="date" id="f_date" class="input-ctrl"></div>
            <div class="form-group"><label class="form-label">Descripción</label><input type="text" id="f_desc" class="input-ctrl" placeholder="Descripción del movimiento"></div>
            <div class="form-group"><label class="form-label">Categoría</label><select id="f_cat" class="input-ctrl" onchange="handleCat(this.value)"></select></div>
            <div id="grpCuotas" class="form-group hidden"><label class="form-label">Total de cuotas</label><input type="number" id="f_cuotas" class="input-ctrl" placeholder="Ej: 3"></div>
            <div class="form-group"><label class="form-label">Monto</label><input type="number" id="f_amt" class="input-ctrl" placeholder="0.00" step="0.01"></div>
            <button class="btn-save" id="saveBtn" onclick="doSave()">Guardar Registro</button>
        </div>
    </div>
<div id="tab-registros" class="tab-content">
    <h2 style="color:var(--primary-p); margin-bottom:15px;">Historial de Movimientos</h2>
    
    <div style="background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button onclick="exportData()" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 0.8rem; cursor: pointer;">📤 Exportar JSON</button>
            <button onclick="document.getElementById('fileInput').click()" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 0.8rem; cursor: pointer;">📥 Importar JSON</button>
            <input type="file" id="fileInput" class="hidden" accept=".json" onchange="importData(event)">
        </div>
        
        <div style="display: flex; align-items: center; gap: 8px;">
            <input type="date" id="filter_start" class="input-ctrl" style="padding: 8px; font-size: 0.8rem;">
            <span style="font-size: 0.8rem; color: #64748b;">a</span>
            <input type="date" id="filter_end" class="input-ctrl" style="padding: 8px; font-size: 0.8rem;">
            <button onclick="render()" style="background: var(--primary-p); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer;">🔍</button>
        </div>
    </div>

    <div id="listReg"></div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="nav('inicio', this)">🏠<span>Inicio</span></button>
    <button class="tab-item" onclick="nav('registros', this)">📋<span>Registros</span></button>
</nav>

<div id="modalGeneric" class="modal-overlay">
    <div class="modal-body" id="modalContent"></div>
</div>

<script>
    let db, curAcc = 'personal', selIds = [], selNames = [], tSum = 0;
    // REGLA: "Pago Tarjeta" ahora está fuera de incomeRules para que reste
    const incomeRules = ['quincena', 'ahorro', '💳_pago', '🤑_pago_prestamo'];

    const request = indexedDB.open("FinanzasDanielDB", 2);
    request.onsuccess = (e) => { db = e.target.result; refresh(); init(); };
    request.onupgradeneeded = (e) => { 
        let d = e.target.result; 
        if(!d.objectStoreNames.contains("trans")) d.createObjectStore("trans", { keyPath: "id", autoIncrement: true });
    };

    function init() { document.getElementById('f_date').valueAsDate = new Date(); updateCats(); }

    function nav(id, b) {
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        b.classList.add('active');
        if(id === 'registros') render();
    }

    function changeAcc(a) {
        curAcc = a;
        document.getElementById('mainCard').classList.toggle('corriente-mode', a==='corriente');
        document.getElementById('panelC').classList.toggle('hidden', a!=='corriente');
        document.getElementById('boxDaily').classList.toggle('hidden', a==='corriente');
        document.getElementById('btnP').classList.toggle('active', a==='personal');
        document.getElementById('btnC').classList.toggle('active', a==='corriente');
        document.getElementById('labelAcc').innerText = a==='corriente' ? "Cuenta Corriente" : "Cuenta Personal";
        document.getElementById('saveBtn').style.background = a==='corriente' ? 'var(--primary-c)' : 'var(--primary-p)';
        document.getElementById('saveBtn').style.color = a==='corriente' ? 'var(--text-dark)' : 'white';
        updateCats(); refresh();
    }

    function updateCats() {
        const s = document.getElementById('f_cat'); s.innerHTML = '';
        const c = curAcc === 'personal' ? 
            [{v:'🛒_dia_a_dia',t:'🛒 Día a Día'},{v:'📉_pasivo',t:'📉 Pasivo'},{v:'🍕_recreacion',t:'🍕 Recreación'},{v:'💰_ahorro',t:'💰 Ahorro'},{v:'💵_quincena',t:'💵 Quincena'},{v:'🏦_prestamo',t:'🏦 Préstamo'},{v:'🤑_pago_prestamo',t:'🤑 Pago Préstamo'},{v:'💳_pago_tarjeta',t:'💳 Pago Tarjeta'}] :
            [{v:'🛒_dia_a_dia',t:'🛒 Día a Día'},{v:'📉_pasivo',t:'📉 Pasivo'},{v:'🍕_recreacion',t:'🍕 Recreación'},{v:'📅_cuotas',t:'📅 Cuotas'},{v:'💳_pago',t:'💳 Pago'}];
        c.forEach(x => { let o = document.createElement('option'); o.value = x.v; o.innerText = x.t; s.appendChild(o); });
    }

    function handleCat(v) {
        document.getElementById('grpCuotas').classList.toggle('hidden', v !== '📅_cuotas');
        if (v.includes('pago') || v.includes('tarjeta')) openConciliacion(v);
    }

    function openConciliacion(cat) {
        const modal = document.getElementById('modalGeneric');
        const content = document.getElementById('modalContent');
        selIds = []; tSum = 0;
        let targetAcc = cat.includes('prestamo') ? 'personal' : 'corriente';
        let targetCats = cat.includes('prestamo') ? ['🏦_prestamo'] : ['🛒_dia_a_dia', '📉_pasivo', '🍕_recreacion', '📅_cuotas'];

        db.transaction("trans","readonly").objectStore("trans").getAll().onsuccess = (e) => {
            const pending = e.target.result.filter(r => r.acc === targetAcc && r.amt < 0 && r.status === 'pending' && targetCats.includes(r.cat));
            content.innerHTML = `<h3>Liquidar Pendientes</h3><div id="pList"></div>
                <div style="background:#f8fafc; padding:15px; border-radius:10px; margin-top:15px;">
                    Total a pagar: <b id="tS" style="color:var(--primary-p); font-size:1.2rem;">$0.00</b>
                </div>
                <button onclick="applyCon()" class="btn-save" style="margin-top:15px;">Cargar Pago</button>
                <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:gray">Cancelar</button>`;
            
            const list = document.getElementById('pList');
            pending.forEach(r => {
                let cuotaAmt = r.cat === '📅_cuotas' ? (Math.abs(r.amt)/r.total_cuotas) : Math.abs(r.amt);
                let faltante = r.cat === '📅_cuotas' ? (Math.abs(r.amt) - (cuotaAmt * r.cuotas_pagadas)) : 0;
                let infoExtra = r.cat === '📅_cuotas' ? `<br><small style="color:var(--danger)">Cuota: $${cuotaAmt.toFixed(2)} | Restante: $${(faltante-cuotaAmt).toFixed(2)}</small>` : '';
                
                let d = document.createElement('div');
                d.style = "padding:12px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:12px;";
                d.innerHTML = `<input type="checkbox" style="width:20px; height:20px" onchange="tick(${r.id},${cuotaAmt},'${r.desc}')"> 
                               <div style="flex:1"><b>${r.desc}</b><br><small>${r.cat.replace(/_/g,' ')} ${r.cat==='📅_cuotas' ? (r.cuotas_pagadas+1)+'/'+r.total_cuotas : ''}</small>${infoExtra}</div>
                               <div style="font-weight:bold">$${cuotaAmt.toFixed(2)}</div>`;
                list.appendChild(d);
            });
            modal.classList.add('show');
        };
    }

    function tick(id, m, name) {
        const i = selIds.indexOf(id);
        if(i > -1) { 
            selIds.splice(i,1); 
            selNames.splice(selNames.indexOf(name), 1);
            tSum -= m; 
        } else { 
            selIds.push(id); 
            selNames.push(name);
            tSum += m; 
        }
        document.getElementById('tS').innerText = `$${tSum.toFixed(2)}`;
    }

    function applyCon() { 
        document.getElementById('f_amt').value = tSum.toFixed(2);
        // MODIFICACIÓN: Si solo hay un item seleccionado, copiar la descripción
        if(selIds.length === 1) {
            document.getElementById('f_desc').value = selNames[0];
        }
        closeModal(); 
    }

    function closeModal() { document.getElementById('modalGeneric').classList.remove('show'); }

    function doSave() {
        const d = document.getElementById('f_date').value, de = document.getElementById('f_desc').value,
              ca = document.getElementById('f_cat').value, am = parseFloat(document.getElementById('f_amt').value);
        if(!de || isNaN(am)) return alert("Datos incompletos");

        const tx = db.transaction("trans", "readwrite"), st = tx.objectStore("trans");

        // REGLA DE SIGNO CORREGIDA: "💳_pago_tarjeta" DEBE SER NEGATIVO EN PERSONAL
        let finalAmt = -am; 
        if (incomeRules.includes(ca) || ca.includes('quincena') || ca.includes('ahorro')|| ca.includes('💳_pago')) {
            finalAmt = am;
        }
        if (ca === '💳_pago_tarjeta') finalAmt = -am; // Forzar que sea resta

        const entry = { date:d, desc:de, cat:ca, amt: finalAmt, acc:curAcc, status:'pending', kids: [...selIds], ts:Date.now() };

        if (ca === '📅_cuotas') { entry.total_cuotas = parseInt(document.getElementById('f_cuotas').value) || 1; entry.cuotas_pagadas = 0; }

        // LÓGICA DE PARTIDA DOBLE (Transferencia automática Personal -> Corriente)
       if (curAcc === 'personal' && ca === '💳_pago_tarjeta') {
            const mirror = { date:d, desc: `PAGO DE TARJETA (${de})`, cat: '💳_pago', amt: am, acc: 'corriente', status:'paid', ts:Date.now() + 1 };
            st.add(mirror);
        }


        selIds.forEach(id => {
            let req = st.get(id);
            req.onsuccess = () => { 
                let res = req.result; 
                if (res.cat === '📅_cuotas') {
                    res.cuotas_pagadas++;
                    if(res.cuotas_pagadas >= res.total_cuotas) res.status = 'paid';
                } else { res.status = 'paid'; }
                st.put(res); 
            };
        });

        st.add(entry).onsuccess = () => { 
             
            document.getElementById('f_desc').value=''; 
            document.getElementById('f_amt').value=''; 
            document.getElementById('f_cuotas').value=''; 
            selIds=[];
            resetUI();
            refresh(); 
        };
    }

    function resetUI() {
        document.getElementById('f_desc').value=''; document.getElementById('f_amt').value=''; 
        document.getElementById('f_cuotas').value=''; selIds=[]; selNames=[];
    }

    function refresh() {
        db.transaction("trans","readonly").objectStore("trans").getAll().onsuccess = (e) => {
            let sP = 0, sC = 0;
            e.target.result.forEach(r => { if(r.acc==='personal') sP += r.amt; else sC += r.amt; });
            document.getElementById('balDisplay').innerText = `$${(curAcc==='personal'?sP:sC).toFixed(2)}`;
            document.getElementById('valProj').innerText = `$${(curAcc==='personal'?sP:400+sC).toFixed(2)}`;
            if(curAcc==='personal') {
                const hoy = new Date().getDate(), dMax = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate();
                const dias = hoy < 14 ? (14-hoy+1) : (dMax-hoy);
                document.getElementById('valDaily').innerText = `$${(sP>0?sP/dias:0).toFixed(2)}`;
            }
        };
    }

function render() {
    const l = document.getElementById('listReg'); l.innerHTML = "";
    db.transaction("trans","readonly").objectStore("trans").getAll().onsuccess = (e) => {
        const all = e.target.result.filter(r => r.acc === curAcc);
        
        // 1. Calcular el saldo total acumulado hasta hoy para esta cuenta
        let runningBalance = all.reduce((sum, r) => sum + r.amt, 0);

        // 2. Ordenar para mostrar: Cuotas pendientes arriba, luego por tiempo (más reciente primero)
        const sorted = all.sort((a,b) => {
            if(a.cat === '📅_cuotas' && a.status === 'pending' && b.cat !== '📅_cuotas') return -1;
            if(b.cat === '📅_cuotas' && b.status === 'pending' && a.cat !== '📅_cuotas') return 1;
            return b.ts - a.ts;
        });

        // 3. Renderizar y descontar del saldo acumulado
        sorted.forEach(r => {
            let d = document.createElement('div');
            d.className = `reg-item ${r.cat==='📅_cuotas'&&r.status==='pending'?'prioridad':''}`;
            d.style.borderLeftColor = r.amt > 0 ? 'var(--success)' : 'var(--danger)';
            
            let extra = r.cat === '📅_cuotas' ? `<br><small style="color:var(--primary-p); font-weight:bold;">CUOTA: ${r.cuotas_pagadas}/${r.total_cuotas}</small>` : '';
            
            // El "Restante" se muestra antes de restar el monto del movimiento actual para el siguiente registro
            d.innerHTML = `
                <div class="reg-info">
                    <small>${r.date}</small>
                    <b>${r.cat.replace(/_/g,' ')}</b>
                    <span>${r.desc}</span>
                    ${extra}
                </div>
                <div style="text-align:right">
                    <div style="font-weight:bold; font-size:1.1rem; color:${r.amt>0?'var(--success)':'var(--danger)'}">
                        ${r.amt>0?'+':''}$${Math.abs(r.amt).toFixed(2)}
                    </div>
                    <div style="font-size:0.75rem; color:#64748b; font-weight:600; margin-top:4px;">
                        Saldo: $${runningBalance.toFixed(2)}
                    </div>
                </div>`;
            
            // Actualizamos el balance para el registro que sigue en la lista (que es cronológicamente anterior)
            runningBalance -= r.amt;
            
            d.onclick = () => showDetail(r);
            l.appendChild(d);
        });
    };
}

    async function showDetail(r) {
        const modal = document.getElementById('modalGeneric');
        const content = document.getElementById('modalContent');
        let html = `<h3>Detalles del Movimiento</h3><p><b>Fecha:</b> ${r.date}</p><p><b>Descripción:</b> ${r.desc}</p><p><b>Monto Total:</b> $${Math.abs(r.amt).toFixed(2)}</p><hr>`;
        
        if(r.cat === '📅_cuotas') {
            html += `<h4>Historial de Abonos</h4>`;
            const tx = db.transaction("trans","readonly").objectStore("trans");
            const all = await new Promise(res => { tx.getAll().onsuccess = (ev) => res(ev.target.result); });
            const abonos = all.filter(a => a.kids && a.kids.includes(r.id));
            if(abonos.length > 0) {
                abonos.forEach(a => { html += `<div style="display:flex; justify-content:space-between; font-size:0.85rem; padding:5px 0;"><span>${a.date} - ${a.desc}</span><b>$${Math.abs(a.amt).toFixed(2)}</b></div>`; });
            } else { html += `<p style="color:gray; font-size:0.85rem;">No se han registrado abonos aún.</p>`; }
            html += `<p style="margin-top:10px;"><b>Estado:</b> ${r.cuotas_pagadas}/${r.total_cuotas} cuotas pagadas.</p>`;
        } else if(r.kids && r.kids.length > 0) {
            html += `<h4>Facturas Liquidadas</h4>`;
            const tx = db.transaction("trans","readonly").objectStore("trans");
            for(let id of r.kids) {
                const sub = await new Promise(res => { tx.get(id).onsuccess = (ev) => res(ev.target.result); });
                if(sub) html += `<div style="display:flex; justify-content:space-between; font-size:0.85rem;"><span>${sub.desc}</span><b>$${(Math.abs(sub.amt)/ (sub.total_cuotas || 1)).toFixed(2)}</b></div>`;
            }
        }
        html += `<button onclick="closeModal()" class="btn-save" style="background:var(--text-dark); margin-top:15px">Cerrar</button>`;
        content.innerHTML = html;
        modal.classList.add('show');
    }


    // --- FUNCIONES DE RESPALDO (JSON) ---
function exportData() {
    const tx = db.transaction("trans", "readonly");
    tx.objectStore("trans").getAll().onsuccess = (e) => {
        const data = JSON.stringify(e.target.result, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `finanzas_daniel_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    };
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            const tx = db.transaction("trans", "readwrite");
            const st = tx.objectStore("trans");
            st.clear(); // Limpia la base actual antes de importar
            data.forEach(item => {
                delete item.id; // Deja que IndexedDB genere nuevos IDs
                st.add(item);
            });
            tx.oncomplete = () => { alert("Importación exitosa"); render(); refresh(); };
        } catch (err) { alert("Error al leer el archivo"); }
    };
    reader.readAsText(file);
}

// --- ACTUALIZACIÓN DE RENDER CON FILTRO ---
function render() {
    const l = document.getElementById('listReg'); l.innerHTML = "";
    const start = document.getElementById('filter_start').value;
    const end = document.getElementById('filter_end').value;

    db.transaction("trans","readonly").objectStore("trans").getAll().onsuccess = (e) => {
        let all = e.target.result.filter(r => r.acc === curAcc);
        
        // Aplicar filtro de fecha si existen valores
        if (start || end) {
            all = all.filter(r => {
                const rDate = r.date; // Formato YYYY-MM-DD
                return (!start || rDate >= start) && (!end || rDate <= end);
            });
        }

        // Lógica de saldo acumulado (Running Balance)
        let runningBalance = all.reduce((sum, r) => sum + r.amt, 0);

        const sorted = all.sort((a,b) => {
            if(a.cat === '📅_cuotas' && a.status === 'pending' && b.cat !== '📅_cuotas') return -1;
            if(b.cat === '📅_cuotas' && b.status === 'pending' && a.cat !== '📅_cuotas') return 1;
            return b.ts - a.ts;
        });

        sorted.forEach(r => {
            let d = document.createElement('div');
            d.className = `reg-item ${r.cat==='📅_cuotas'&&r.status==='pending'?'prioridad':''}`;
            d.style.borderLeftColor = r.amt > 0 ? 'var(--success)' : 'var(--danger)';
            
            let extra = r.cat === '📅_cuotas' ? `<br><small style="color:var(--primary-p); font-weight:bold;">CUOTA: ${r.cuotas_pagadas}/${r.total_cuotas}</small>` : '';
            
            d.innerHTML = `
                <div class="reg-info">
                    <small>${r.date}</small>
                    <b>${r.cat.replace(/_/g,' ')}</b>
                    <span>${r.desc}</span>
                    ${extra}
                </div>
                <div style="text-align:right">
                    <div style="font-weight:bold; font-size:1.1rem; color:${r.amt>0?'var(--success)':'var(--danger)'}">
                        ${r.amt>0?'+':''}$${Math.abs(r.amt).toFixed(2)}
                    </div>
                    <div style="font-size:0.75rem; color:#64748b; font-weight:600; margin-top:4px;">
                        Saldo: $${runningBalance.toFixed(2)}
                    </div>
                </div>`;
            
            runningBalance -= r.amt;
            d.onclick = () => showDetail(r);
            l.appendChild(d);
        });
    };
}

</script>
